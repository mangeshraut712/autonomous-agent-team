name: Repository Health Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail
          required=(
            README.md
            AGENTS.md
            SOUL.md
            MEMORY.md
            HEARTBEAT.md
            .env.example
            .gitignore
            Makefile
            docs/README.md
            docs/operations.md
            docs/telegram-setup.md
            docs/web-search-providers.md
            docs/deployment.md
            scripts/add-cron-jobs.sh
            scripts/status.sh
            scripts/test.sh
            scripts/ready-strict.sh
            scripts/notify.sh
            scripts/notifier-install.sh
            scripts/sync-openclaw-env.sh
            scripts/workspace-setup.sh
            scripts/parallel-search.sh
            scripts/cleanup-root.sh
            scripts/deploy-docker.sh
          )

          for file in "${required[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          bash -n scripts/*.sh

      - name: Makefile sanity
        run: |
          set -euo pipefail
          make help

      - name: .env.example sanity
        run: |
          set -euo pipefail
          grep -q '^TELEGRAM_BOT_TOKEN=' .env.example
          grep -q '^TELEGRAM_CHAT_TARGET=' .env.example

      - name: Success
        run: echo "Repository checks passed"
